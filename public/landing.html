<!-- Landing page: rater enters their code and role, then receives an episode assignment. -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vetrix — Podcast Evaluatie</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-header">
  <h1>Kwaliteitsevaluatie AI-gegenereerde Podcast</h1>
  <p>Vetrix Anesthesiology — Validatiestudie</p>
</div>

<div class="landing-card fade-in">
  <div class="landing-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <h2>Welkom</h2>
  <p class="subtitle">Voer uw gegevens in om te beginnen met een beoordeling.</p>

  <div class="form-group">
    <label for="raterCode">Beoordelaarscode</label>
    <input type="text" id="raterCode" placeholder="bijv. R-01" autocomplete="off">
  </div>

  <div class="form-group">
    <label for="raterRole">Functie</label>
    <select id="raterRole">
      <option value="">— selecteer —</option>
      <option value="Anesthesioloog">Anesthesioloog</option>
      <option value="AIOS anesthesiologie">AIOS anesthesiologie</option>
    </select>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="btn-primary" id="startBtn" style="width:100%;">Start beoordeling</button>

  <div class="done-msg" id="doneMsg">
    <strong>Alle afleveringen zijn beoordeeld.</strong><br>
    Er zijn geen afleveringen meer beschikbaar. Hartelijk dank voor uw deelname!
  </div>
</div>

<script src="/js/landing.js"></script>
</body>
</html>
