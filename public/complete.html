<!-- Completion page: shown after successful submission. Offers option to evaluate another episode. -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vetrix — Beoordeling verstuurd</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-header">
  <h1>Kwaliteitsevaluatie AI-gegenereerde Podcast</h1>
  <p>Vetrix Anesthesiology — Validatiestudie</p>
</div>

<div class="complete-card">
  <div class="checkmark">&#10003;</div>
  <h2>Bedankt voor uw beoordeling!</h2>
  <p>Uw evaluatie is succesvol opgeslagen. U kunt dit venster sluiten of nog een aflevering beoordelen.</p>
  <button class="btn-primary" id="anotherBtn" style="width:100%;">Nog een aflevering beoordelen</button>
</div>

<script>
  // Redirect back to landing page, preserving the rater code in the URL
  document.getElementById('anotherBtn').addEventListener('click', () => {
    const params = new URLSearchParams(window.location.search);
    const rater = params.get('rater');
    window.location.href = rater ? '/?rater=' + encodeURIComponent(rater) : '/';
  });
</script>
</body>
</html>
