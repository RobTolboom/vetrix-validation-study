# Vetrix Validation Webapp — Docker Compose configuration
# Volumes:
#   - episodes/ is mounted read-only (episode data does not change at runtime)
#   - data/ is mounted read-write (submissions.json is written here)
# Set ADMIN_PASSWORD in .env (see .env.example)

services:
  vetrix-webapp:
    build: .
    container_name: vetrix-webapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - NODE_ENV=production
    volumes:
      - ./episodes:/app/episodes:ro   # Episode data (audio, PDF, transcript)
      - ./data:/app/data              # Persistent storage (submissions.json)
